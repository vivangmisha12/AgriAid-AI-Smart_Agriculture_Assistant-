<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <style>
      .box{fill:#ffffff;stroke:#2d6a4f;stroke-width:3;rx:10;}
      .actor{fill:#e6f4ea;stroke:#2d6a4f;stroke-width:2;}
      .text{font-family:Arial, Helvetica, sans-serif;fill:#123;}
      .label{font-size:16px;font-weight:700;}
      .small{font-size:13px;}
      .arrow{stroke:#2d6a4f;stroke-width:3;marker-end:url(#arrowhead);} 
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d6a4f" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="label text">DFD Level 0 — Context Diagram</text>

  <!-- Farmer actor -->
  <g transform="translate(60,120)">
    <rect class="actor" x="0" y="0" rx="8" ry="8" width="180" height="60"/>
    <text class="text small" x="90" y="36" text-anchor="middle">Farmer / User</text>
  </g>

  <!-- Admin actor -->
  <g transform="translate(960,120)">
    <rect class="actor" x="0" y="0" rx="8" ry="8" width="180" height="60"/>
    <text class="text small" x="90" y="36" text-anchor="middle">Admin</text>
  </g>

  <!-- ML Model actor -->
  <g transform="translate(60,420)">
    <rect class="actor" x="0" y="0" rx="8" ry="8" width="180" height="60"/>
    <text class="text small" x="90" y="36" text-anchor="middle">ML Model / KB</text>
  </g>

  <!-- Central System -->
  <g transform="translate(320,180)">
    <rect class="box" x="0" y="0" width="560" height="200" rx="14" ry="14"/>
    <text class="text label" x="280" y="110" text-anchor="middle">AgriAid — Smart Farming Assistant</text>
  </g>

  <!-- Arrows -->
  <line x1="240" y1="150" x2="320" y2="230" class="arrow" />
  <text class="text small" x="220" y="140">Upload Image / Query</text>

  <line x1="880" y1="230" x2="960" y2="150" class="arrow" />
  <text class="text small" x="920" y="140" text-anchor="end">View Logs / Reports</text>

  <line x1="600" y1="380" x2="600" y2="450" class="arrow" />
  <text class="text small" x="620" y="420">Predict / Provide Results</text>

  <!-- small arrows from actors toward central system -->
  <line x1="150" y1="180" x2="320" y2="200" class="arrow" />
  <line x1="1040" y1="180" x2="880" y2="200" class="arrow" />
  <line x1="150" y1="450" x2="320" y2="360" class="arrow" />

  <!-- legend -->
  <rect x="20" y="520" width="1160" height="62" fill="#f7fffb" stroke="#e6f4ea" rx="8"/>
  <text x="40" y="548" class="text small">Legend: Farmer/User = initiates uploads & queries. ML Model = provides predictions. Admin = monitors logs and datasets.</text>
</svg>
